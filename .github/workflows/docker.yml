name: Build and Push Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    steps:
    - uses: actions/checkout@v3

    - name: Login to GHCR
      run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build Image
      run: docker build -t ghcr.io/${{ github.actor }}/gh100-flask-demo:latest .

    - name: Push Image
      run: docker push ghcr.io/${{ github.actor }}/gh100-flask-demo:latest
